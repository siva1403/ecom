name: Build and Push Microservices

on:
  push:
    branches: [ "master", "main" ]

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate service list
        id: set
        run: |
          services=$(ls services | jq -R -s -c 'split("\n")[:-1]')
          echo "services=$services" >> $GITHUB_OUTPUT

  build:
    needs: set-matrix
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.set-matrix.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show service
        run: echo "Building ${{ matrix.service }}"

      - name: Install Dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
            ./services/${{ matrix.service }}

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
